[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "django-icv-tree"
version = "0.2.0"
description = "Materialised path tree structures for Django — configurable path format, queryset returns, async-safe, no tenancy coupling."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{name = "Nigel Copley"}]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Framework :: Django",
    "Framework :: Django :: 5.0",
    "Framework :: Django :: 5.1",
    "Framework :: Django :: 6.0",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
keywords = [
    "django",
    "tree",
    "materialised-path",
    "treebeard",
    "mptt",
]
dependencies = [
    "Django>=5.0",
]

[project.optional-dependencies]
icv-core = ["django-icv-core"]
dev = [
    "pytest>=8.0",
    "pytest-django>=4.8",
    "pytest-cov>=5.0",
    "factory-boy>=3.3",
    "ruff>=0.5.0",
    "mypy>=1.10",
    "django-stubs>=5.0",
]

[project.urls]
Homepage = "https://github.com/nigelcopley/icv-oss"
Documentation = "https://github.com/nigelcopley/icv-oss/tree/main/packages/icv-tree"
Changelog = "https://github.com/nigelcopley/icv-oss/tree/main/packages/icv-tree/CHANGELOG.md"
"Issue Tracker" = "https://github.com/nigelcopley/icv-oss/issues"
"Source Code" = "https://github.com/nigelcopley/icv-oss/tree/main/packages/icv-tree"

[tool.setuptools.packages.find]
where = ["src"]

# pytest config is centralised in the root pyproject.toml.
# Run tests from the project root: pytest packages/icv-tree/tests/

# ruff config is centralised in the root pyproject.toml.

[tool.mypy]
python_version = "3.11"
plugins = ["mypy_django_plugin.main"]
strict = false

[tool.django-stubs]
django_settings_module = "tests.settings"

[tool.coverage.run]
source = ["src"]
omit = ["*/migrations/*", "*/testing/*"]

[tool.coverage.report]
fail_under = 90
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ ==",
]
