name: Publish icv-tree to PyPI

# Triggered by tags of the form: icv-tree/v0.1.0
#
# OIDC trusted publishing — no API token is required in repository secrets.
# Configure trusted publishing in your PyPI project settings:
#   Publisher: GitHub Actions
#   Owner: nigelcopley
#   Repository: icv-oss
#   Workflow: publish-tree.yml
#   Environment: pypi

on:
  push:
    tags:
      - "icv-tree/v*"

env:
  FORCE_COLOR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  PACKAGE_NAME: icv-tree
  PACKAGE_DIR: packages/icv-tree

permissions:
  contents: write
  id-token: write

jobs:
  # ── 1. Parse version from the tag ──────────────────────────────────────────
  resolve:
    name: Resolve version from tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      release_title: ${{ steps.parse.outputs.release_title }}
    steps:
      - name: Parse tag
        id: parse
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#*/v}"
          if [[ -z "$VERSION" ]]; then
            echo "ERROR: Could not parse version from tag '$TAG'"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_title=icv-tree v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

  # ── 2. Run the test suite before publishing ────────────────────────────────
  test:
    name: Test icv-tree
    runs-on: ubuntu-latest
    needs: resolve

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "Django~=5.1.0"
          pip install pytest pytest-django pytest-cov pytest-mock factory-boy
          # icv-tree has no mandatory icv-core dependency
          pip install -e "packages/icv-tree"

      - name: Run tests
        run: |
          pytest "packages/icv-tree/tests/" \
            -v --tb=short --color=yes \
            -m "not slow"
        env:
          DJANGO_SETTINGS_MODULE: settings
          PYTHONPATH: packages/icv-tree/src:packages/icv-tree/tests
          DB_ENGINE: django.db.backends.sqlite3

  # ── 3. Build wheel and sdist ───────────────────────────────────────────────
  build:
    name: Build icv-tree
    runs-on: ubuntu-latest
    needs: [resolve, test]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel and sdist
        working-directory: packages/icv-tree
        run: python -m build

      - name: Verify distributions with twine
        working-directory: packages/icv-tree
        run: twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-icv-tree-${{ needs.resolve.outputs.version }}
          path: packages/icv-tree/dist/
          if-no-files-found: error

  # ── 4. Publish to PyPI via OIDC trusted publishing ────────────────────────
  publish:
    name: Publish icv-tree to PyPI
    runs-on: ubuntu-latest
    needs: [resolve, build]
    environment: pypi

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-icv-tree-${{ needs.resolve.outputs.version }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true

  # ── 5. Create GitHub Release ───────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve, publish]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-icv-tree-${{ needs.resolve.outputs.version }}
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.resolve.outputs.release_title }}
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ startsWith(needs.resolve.outputs.version, '0.') }}
          fail_on_unmatched_files: true
