name: Publish django-boundary to PyPI

# Triggered by tags of the form: django-boundary/v0.1.0
#
# OIDC trusted publishing — no API token is required in repository secrets.
# Configure trusted publishing in your PyPI project settings:
#   Publisher: GitHub Actions
#   Owner: nigelcopley
#   Repository: icv-oss
#   Workflow: publish-boundary.yml
#   Environment: pypi

on:
  push:
    tags:
      - "django-boundary/v*"

env:
  FORCE_COLOR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  PACKAGE_NAME: django-boundary
  PACKAGE_DIR: packages/django-boundary

permissions:
  contents: write
  id-token: write

jobs:
  # ── 1. Parse version from the tag ──────────────────────────────────────────
  resolve:
    name: Resolve version from tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      release_title: ${{ steps.parse.outputs.release_title }}
    steps:
      - name: Parse tag
        id: parse
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#*/v}"
          if [[ -z "$VERSION" ]]; then
            echo "ERROR: Could not parse version from tag '$TAG'"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_title=django-boundary v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

  # ── 2. Run the test suite before publishing ────────────────────────────────
  test:
    name: Test django-boundary
    runs-on: ubuntu-latest
    needs: resolve

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: icv_test
          POSTGRES_PASSWORD: icv_test_password
          POSTGRES_DB: boundary_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "Django~=5.1.0"
          pip install pytest pytest-django pytest-cov factory-boy psycopg[binary]
          pip install -e "packages/django-boundary"

      - name: Run tests
        run: |
          pytest "packages/django-boundary/tests/" \
            -v --tb=short --color=yes \
            -o "pythonpath=packages/django-boundary/src packages/django-boundary/tests"
        env:
          DJANGO_SETTINGS_MODULE: settings
          POSTGRES_USER: icv_test
          POSTGRES_PASSWORD: icv_test_password
          POSTGRES_DB: boundary_test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"

  # ── 3. Build wheel and sdist ───────────────────────────────────────────────
  build:
    name: Build django-boundary
    runs-on: ubuntu-latest
    needs: [resolve, test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel and sdist
        working-directory: packages/django-boundary
        run: python -m build

      - name: Verify distributions with twine
        working-directory: packages/django-boundary
        run: twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-django-boundary-${{ needs.resolve.outputs.version }}
          path: packages/django-boundary/dist/
          if-no-files-found: error

  # ── 4. Publish to PyPI via OIDC trusted publishing ────────────────────────
  publish:
    name: Publish django-boundary to PyPI
    runs-on: ubuntu-latest
    needs: [resolve, build]
    environment: pypi

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-django-boundary-${{ needs.resolve.outputs.version }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true

  # ── 5. Create GitHub Release ───────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve, publish]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-django-boundary-${{ needs.resolve.outputs.version }}
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.resolve.outputs.release_title }}
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ startsWith(needs.resolve.outputs.version, '0.') }}
          fail_on_unmatched_files: true
