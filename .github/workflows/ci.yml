name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_COLOR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: icv_test
          POSTGRES_PASSWORD: icv_test_password
          POSTGRES_DB: icv_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "Django~=5.1.0"
          pip install pytest pytest-django pytest-cov pytest-mock factory-boy djangorestframework
          pip install psycopg2-binary "psycopg[binary]"

      - name: Install all packages
        run: |
          for pkg in packages/icv-* packages/django-*; do
            if [ -d "$pkg" ]; then
              echo "Installing $(basename $pkg)..."
              pip install -e "$pkg"
            fi
          done

      - name: Test icv-core
        if: always()
        run: pytest packages/icv-core/tests/ -v --tb=short --color=yes
        env:
          DJANGO_SETTINGS_MODULE: settings
          PYTHONPATH: packages/icv-core/src:packages/icv-core/tests
          DATABASE_URL: postgresql://icv_test:icv_test_password@localhost:5432/icv_test_db

      - name: Test icv-tree
        if: always()
        run: pytest packages/icv-tree/tests/ -v --tb=short --color=yes
        env:
          DJANGO_SETTINGS_MODULE: settings
          PYTHONPATH: packages/icv-tree/src:packages/icv-tree/tests

      - name: Test icv-search
        if: always()
        run: pytest packages/icv-search/tests/ -v --tb=short --color=yes
        env:
          DJANGO_SETTINGS_MODULE: settings
          PYTHONPATH: packages/icv-search/src:packages/icv-search/tests
          DATABASE_URL: postgresql://icv_test:icv_test_password@localhost:5432/icv_test_db

      - name: Test icv-sitemaps
        if: always()
        run: pytest packages/icv-sitemaps/tests/ -v --tb=short --color=yes
        env:
          DJANGO_SETTINGS_MODULE: settings
          PYTHONPATH: packages/icv-sitemaps/src:packages/icv-sitemaps/tests
          DATABASE_URL: postgresql://icv_test:icv_test_password@localhost:5432/icv_test_db

      - name: Test django-boundary
        if: always()
        run: pytest packages/django-boundary/tests/ -v --tb=short --color=yes
        env:
          DJANGO_SETTINGS_MODULE: settings
          PYTHONPATH: packages/django-boundary/src:packages/django-boundary/tests
          POSTGRES_USER: icv_test
          POSTGRES_PASSWORD: icv_test_password
          POSTGRES_DB: icv_test_db
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"

  build:
    name: Build Distribution Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: pip install build twine

      - name: Build packages
        run: |
          for pkg in packages/icv-* packages/django-*; do
            if [ -d "$pkg" ]; then
              echo "Building $(basename $pkg)..."
              cd "$pkg"
              python -m build
              twine check dist/*
              cd "$GITHUB_WORKSPACE"
            fi
          done
